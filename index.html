<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sortex | Professional RTDP Interface</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --accent: #10b981;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        nav {
            width: 260px;
            background: #020617;
            border-right: 1px solid #334155;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
            padding-left: 1rem;
            letter-spacing: 1px;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
        }

        .nav-item:hover { 
            background: #1e293b; 
            color: white;
        }

        .nav-item.active { 
            background: var(--primary); 
            color: white; 
        }

        /* Main Content Area */
        main { 
            flex: 1; 
            padding: 2rem; 
            overflow-y: auto; 
            scroll-behavior: smooth;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .system-time {
            font-family: monospace;
            color: var(--accent);
            background: #064e3b;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Statistics Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        /* Dashboard Layout */
        .dashboard-main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .live-feed, .collab-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #334155;
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        #feed-container {
            overflow-y: auto;
            flex: 1;
            margin-top: 1rem;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        #feed-container::-webkit-scrollbar { width: 6px; }
        #feed-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .issue-item {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 4px;
            background: #334155;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-resolve {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-resolve:hover { background: #2563eb; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.4);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.7); }
            100% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SORTEX</div>
        <div class="nav-item active" onclick="switchTab(this)"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-item" onclick="switchTab(this)"><i class="fas fa-map-marked-alt"></i> Resource Mapping</div>
        <div class="nav-item" onclick="switchTab(this)"><i class="fas fa-users"></i> Collaboration</div>
        <div class="nav-item" onclick="switchTab(this)"><i class="fas fa-cog"></i> Settings</div>
    </nav>

    <main>
        <header>
            <div>
                <h1>Operations Hub</h1>
                <div class="system-time" id="clock">00:00:00</div>
            </div>
            <button class="btn-resolve" onclick="simulateAlert()">
                <i class="fas fa-plus"></i> New Issue Entry
            </button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div style="color: #94a3b8; font-size: 0.8rem;">ACTIVE CASES</div>
                <div id="case-count" style="font-size: 2rem; font-weight: bold;">24</div>
            </div>
            <div class="stat-card">
                <div style="color: #94a3b8; font-size: 0.8rem;">RESPONSE TIME</div>
                <div style="font-size: 2rem; font-weight: bold; color: var(--accent);">3.2m</div>
            </div>
            <div class="stat-card">
                <div style="color: #94a3b8; font-size: 0.8rem;">SYSTEM STATUS</div>
                <div style="font-size: 1.2rem; font-weight: bold; color: var(--accent); margin-top: 10px;">
                    <span class="pulse"></span>Operational
                </div>
            </div>
        </div>

        <div class="dashboard-main">
            <div class="live-feed">
                <h3><i class="fas fa-broadcast-tower" style="color: var(--primary);"></i> Live Incident Feed</h3>
                <div id="feed-container">
                    <!-- Feed items injected here -->
                </div>
            </div>

            <div class="collab-panel">
                <h3>Collaborators</h3>
                <p style="font-size: 0.9rem; color: #94a3b8;">Active stakeholders in sector.</p>
                <div id="user-list" style="display: flex; flex-direction: column; gap: 12px; margin-top: 1rem;">
                    <!-- User list logic could go here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Dashboard
        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            
            // Add initial items
            addFeedItem("Supply Chain Delay", "Zone A-12", "Identify");
            addFeedItem("Emergency Response Synced", "Downtown Sector", "Resolve", "#10b981");
        });

        // 1. Clock Logic
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }

        // 2. Feed Logic
        function addFeedItem(title, location, tag, color = "#3b82f6") {
            const container = document.getElementById('feed-container');
            const newItem = document.createElement('div');
            newItem.className = 'issue-item';
            newItem.style.borderLeftColor = color;
            
            newItem.innerHTML = `
                <div>
                    <strong>${title}</strong><br>
                    <span style="font-size: 0.8rem; color: #94a3b8;">${location} • Just now</span>
                </div>
                <span class="tag" style="background: ${color}22; color: ${color}; border: 1px solid ${color}">${tag}</span>
            `;
            
            container.prepend(newItem);
        }

        function simulateAlert() {
            const alerts = [
                {t: "Network Latency Spike", l: "Data Hub 4", tag: "Tech", c: "#f59e0b"},
                {t: "Resource Reallocation", l: "North Gate", tag: "Logistics", c: "#3b82f6"},
                {t: "Security Breach Attempt", l: "Secure Vault", tag: "Critical", c: "#ef4444"}
            ];
            const randomAlert = alerts[Math.floor(Math.random() * alerts.length)];
            
            addFeedItem(randomAlert.t, randomAlert.l, randomAlert.tag, randomAlert.c);
            
            // Update Case Count
            const countEl = document.getElementById('case-count');
            countEl.innerText = parseInt(countEl.innerText) + 1;
        }

        // 3. UI Navigation Logic
        function switchTab(element) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
